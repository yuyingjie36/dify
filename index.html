<body>
    <header class="header">
        <div class="header-left">
            <div class="brand-icon">🎬</div>
            <div class="brand-text">
                <span class="brand-title">AI影视助手</span>
                <span class="brand-subtitle">智能观影指南 · 专业影评生成</span>
            </div>
        </div>
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">就绪</span>
        </div>
    </header>

    <main class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🎥</div>
                <div class="empty-text">
                    <strong>你好，我是AI影视助手</strong><br>
                    我可以为你推荐电影、撰写影评、分析剧情、解读角色。<br>
                    输入你的问题或点击下方快捷指令开始对话。
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('推荐一部最近值得看的电影')">推荐最近电影</button>
            <button class="quick-btn" onclick="sendQuickMessage('帮我写一篇《肖申克的救赎》的影评')">影评生成</button>
            <button class="quick-btn" onclick="sendQuickMessage('分析一下《盗梦空间》的剧情结构')">剧情分析</button>
            <button class="quick-btn" onclick="sendQuickMessage('推荐几部类似《星际穿越》的科幻片')">相似推荐</button>
            <button class="quick-btn" onclick="sendQuickMessage('解读《教父》中迈克尔的角色转变')">角色解读</button>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea
                        class="input-field"
                        id="inputField"
                        placeholder="输入你的问题，比如：推荐一部悬疑电影..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
            </div>
        </div>
    </main>

    <script>
        // API Configuration
        const API_BASE = 'https://trippant-vernon-unexecuted.ngrok-free.dev/v1';
        const API_KEY = 'app-7rcvFaTL6e15pPlmtKKu8kCU';

        // State
        let conversationId = null;
        let isStreaming = false;

        // Elements
        const messagesArea = document.getElementById('messagesArea');
        const emptyState = document.getElementById('emptyState');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Status update
        function setStatus(status, text) {
            statusDot.className = 'status-dot ' + status;
            statusText.textContent = text;
        }

        // Initialize - 直接显示就绪状态
        function init() {
            setStatus('connected', '就绪');
        }

        // Auto-resize textarea
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Handle Enter key
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Quick message
        function sendQuickMessage(text) {
            inputField.value = text;
            sendMessage();
        }

        // Send message
        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text || isStreaming) return;

            // Clear input
            inputField.value = '';
            inputField.style.height = 'auto';

            // Hide empty state
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            // Add user message
            addMessage('user', text);

            // Start streaming
            isStreaming = true;
            sendBtn.disabled = true;
            setStatus('connected', '思考中...');

            // Create assistant message element for streaming
            const assistantMsg = createStreamingMessage();
            let fullContent = '';

            try {
                const response = await fetch(`${API_BASE}/chat-messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: {},
                        query: text,
                        response_mode: 'streaming',
                        conversation_id: conversationId,
                        user: 'user-web',
                        auto_generate_name: true
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                // Read SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || ''; // Keep incomplete line in buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const jsonStr = line.slice(6).trim();
                                if (!jsonStr) continue;
                                
                                const data = JSON.parse(jsonStr);
                                const result = handleStreamEvent(data, assistantMsg, fullContent);
                                
                                if (result.content) {
                                    fullContent = result.content;
                                }
                                if (result.conversationId) {
                                    conversationId = result.conversationId;
                                }
                                if (result.done) {
                                    // Stream ended normally
                                    finalizeMessage(assistantMsg, fullContent);
                                    setStatus('connected', '就绪');
                                    isStreaming = false;
                                    sendBtn.disabled = false;
                                    return;
                                }
                                if (result.error) {
                                    throw new Error(result.error);
                                }
                            } catch (e) {
                                console.error('Parse error:', e, 'Line:', line);
                            }
                        }
                    }
                }

                // If stream ended without message_end
                finalizeMessage(assistantMsg, fullContent);
                setStatus('connected', '就绪');

            } catch (error) {
                console.error('Request failed:', error);
                updateStreamingMessage(assistantMsg, '⚠️ 请求失败: ' + error.message);
                finalizeMessage(assistantMsg);
                setStatus('error', '请求失败');
            }

            isStreaming = false;
            sendBtn.disabled = false;
        }

        // Handle SSE events based on Dify API documentation
        function handleStreamEvent(data, element, currentContent) {
            const result = {
                content: currentContent,
                conversationId: null,
                done: false,
                error: null
            };

            const eventType = data.event;

            switch (eventType) {
                case 'workflow_started':
                    // Workflow started, update status
                    console.log('Workflow started:', data.workflow_run_id);
                    break;

                case 'node_started':
                    // Node started executing
                    console.log('Node started:', data.data?.title);
                    break;

                case 'node_finished':
                    // Node finished
                    console.log('Node finished:', data.data?.title, data.data?.status);
                    break;

                case 'workflow_finished':
                    // Workflow finished
                    console.log('Workflow finished:', data.data?.status);
                    break;

                case 'message':
                    // LLM returns text chunk - INCREMENTAL, need to accumulate
                    const answerChunk = data.answer || '';
                    result.content = currentContent + answerChunk;
                    updateStreamingMessage(element, result.content);
                    // Also save conversation_id from message events
                    if (data.conversation_id) {
                        result.conversationId = data.conversation_id;
                    }
                    break;

                case 'message_end':
                    // Stream ended
                    result.done = true;
                    if (data.conversation_id) {
                        result.conversationId = data.conversation_id;
                    }
                    // Log usage info
                    if (data.metadata?.usage) {
                        console.log('Tokens used:', data.metadata.usage.total_tokens);
                    }
                    break;

                case 'message_file':
                    // File event (image, document, etc.)
                    if (data.url) {
                        let fileUrl = data.url;
                        
                        // 修复 Dify 返回的本地路径格式
                        // file:///files/tools/xxx.docx → http://192.168.237.134/files/tools/xxx.docx
                        if (fileUrl.startsWith('file:///')) {
                            fileUrl = fileUrl.replace('file:///', API_BASE.replace('/v1', '') + '/');
                        }
                        
                        let fileHtml = '';
                        
                        if (data.type === 'image') {
                            // 图片直接显示
                            fileHtml = `<img src="${fileUrl}" style="max-width:100%;border-radius:8px;margin-top:0.5rem">`;
                        } else if (data.type === 'document') {
                            // 文档显示下载按钮
                            fileHtml = `
                                <a href="${fileUrl}" target="_blank" download style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border-radius:8px;text-decoration:none;font-weight:500;margin-top:0.8rem">
                                    📄 下载文档
                                </a>`;
                        } else {
                            // 其他文件类型也显示下载链接
                            fileHtml = `
                                <a href="${fileUrl}" target="_blank" download style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;background:var(--bg3);color:var(--accent2);border:1px solid var(--accent);border-radius:8px;text-decoration:none;margin-top:0.8rem">
                                    📎 下载文件
                                </a>`;
                        }
                        
                        result.content = currentContent + fileHtml;
                        updateStreamingMessage(element, result.content);
                    }
                    break;

                case 'message_replace':
                    // Content replaced (e.g., by moderation)
                    result.content = data.answer || '';
                    updateStreamingMessage(element, result.content);
                    break;

                case 'tts_message':
                    // TTS audio chunk - ignore for now (or could play audio)
                    break;

                case 'tts_message_end':
                    // TTS ended
                    break;

                case 'error':
                    // Error event
                    result.error = data.message || `Error: ${data.code}`;
                    result.done = true;
                    break;

                case 'ping':
                    // Heartbeat, ignore
                    break;

                default:
                    console.log('Unknown event:', eventType, data);
            }

            return result;
        }

        // Add message to UI
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'assistant' ? '🎬' : '👤'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesArea.appendChild(messageDiv);
            scrollToBottom();
        }

        // Create streaming message element
        function createStreamingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="message-avatar">🎬</div>
                <div class="message-content streaming"></div>
            `;
            messagesArea.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv.querySelector('.message-content');
        }

        // Update streaming message (supports HTML for images)
        function updateStreamingMessage(element, content) {
            // 渲染Markdown
            const renderedContent = renderMarkdown(content);
            element.innerHTML = renderedContent;
            scrollToBottom();
        }

        // Finalize message (remove streaming indicator)
        function finalizeMessage(element, content = null) {
            element.classList.remove('streaming');
            if (content) {
                const renderedContent = renderMarkdown(content);
                element.innerHTML = renderedContent;
                // 代码高亮
                element.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                // 检测并渲染ECharts图表
                renderEChartsCharts(element);
            }
        }

        // 渲染Markdown（带安全过滤）
        function renderMarkdown(text) {
            // 检查是否包含HTML标签（如图片）
            if (text.includes('<img') || text.includes('<a href')) {
                // 对于已有的HTML，先保护再渲染
                return text;
            }
            
            // 配置marked选项
            marked.setOptions({
                breaks: true,
                gfm: true,
                headerIds: false,
                mangle: false
            });
            
            return marked.parse(text);
        }

        // Escape HTML for plain text (保留用于用户消息等不需要Markdown的场景)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 检测并渲染ECharts图表
        function renderEChartsCharts(element) {
            // 查找所有代码块
            const codeBlocks = element.querySelectorAll('pre code');
            
            codeBlocks.forEach((block, index) => {
                const codeText = block.textContent;
                
                // 尝试解析JSON，检测是否为ECharts配置
                try {
                    const config = JSON.parse(codeText);
                    
                    // 验证是否包含ECharts必需字段
                    if (isValidEChartsConfig(config)) {
                        // 创建全宽图表容器 - 添加到消息区外部
                        const wrapper = document.createElement('div');
                        wrapper.className = 'echarts-wrapper-full';
                        
                        const label = document.createElement('div');
                        label.className = 'echarts-label';
                        label.textContent = '图表可视化';
                        wrapper.appendChild(label);
                        
                        const chartContainer = document.createElement('div');
                        chartContainer.className = 'echarts-container';
                        chartContainer.id = `echarts-${Date.now()}-${index}`;
                        wrapper.appendChild(chartContainer);
                        
                        // 移除代码块（隐藏）
                        const pre = block.parentElement;
                        pre.style.display = 'none';
                        
                        // 将图表容器添加到消息区（而非消息气泡内）
                        const messageDiv = element.closest('.message');
                        if (messageDiv) {
                            messageDiv.parentElement.appendChild(wrapper);
                        } else {
                            messagesArea.appendChild(wrapper);
                        }
                        
                        // 初始化ECharts实例并渲染
                        setTimeout(() => {
                            const chart = echarts.init(chartContainer);
                            
                            // 深色主题配色优化
                            const enhancedConfig = enhanceChartConfig(config);
                            chart.setOption(enhancedConfig);
                            
                            // 自动调整大小以适应容器
                            chart.resize();
                            
                            // 响应式调整 - 使用防抖
                            let resizeTimeout;
                            window.addEventListener('resize', () => {
                                clearTimeout(resizeTimeout);
                                resizeTimeout = setTimeout(() => {
                                    chart.resize();
                                }, 150);
                            });
                            
                            // 监听容器大小变化
                            const resizeObserver = new ResizeObserver(() => {
                                chart.resize();
                            });
                            resizeObserver.observe(chartContainer);
                            
                            // 滚动到新图表位置
                            scrollToBottom();
                        }, 150);
                    }
                } catch (e) {
                    // 不是JSON格式，忽略
                }
            });
        }

        // 验证是否为有效的ECharts配置
        function isValidEChartsConfig(obj) {
            if (typeof obj !== 'object' || obj === null) return false;
            
            // ECharts配置必须包含series或option关键字段
            const hasSeries = obj.series && Array.isArray(obj.series);
            const hasXAxis = obj.xAxis !== undefined;
            const hasYAxis = obj.yAxis !== undefined;
            
            // 至少有series字段
            if (hasSeries) {
                // 检查series是否有type和数据
                if (obj.series.length > 0) {
                    const firstSeries = obj.series[0];
                    return firstSeries.type !== undefined;
                }
            }
            
            return false;
        }

        // 增强图表配置（深色主题适配）
        function enhanceChartConfig(config) {
            const enhanced = JSON.parse(JSON.stringify(config)); // 深拷贝
            
            // 深色主题配色方案
            const darkThemeColors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4'];
            
            // 全局配置
            enhanced.backgroundColor = 'transparent';
            
            // 标题样式
            if (enhanced.title) {
                enhanced.title.textStyle = {
                    color: '#f0b866',
                    fontSize: 18,
                    fontWeight: 600
                };
                enhanced.title.subtextStyle = {
                    color: '#7a7a8c',
                    fontSize: 14
                };
            }
            
            // 提示框样式
            if (enhanced.tooltip) {
                enhanced.tooltip.backgroundColor = 'rgba(30, 30, 40, 0.95)';
                enhanced.tooltip.borderColor = '#d4a574';
                enhanced.tooltip.textStyle = {
                    color: '#e8e8f0'
                };
            }
            
            // 图例样式
            if (enhanced.legend) {
                enhanced.legend.textStyle = {
                    color: '#e8e8f0'
                };
                enhanced.legend.pageTextStyle = {
                    color: '#7a7a8c'
                };
            }
            
            // X轴样式
            if (enhanced.xAxis) {
                if (Array.isArray(enhanced.xAxis)) {
                    enhanced.xAxis.forEach(axis => enhanceAxis(axis));
                } else {
                    enhanceAxis(enhanced.xAxis);
                }
            }
            
            // Y轴样式
            if (enhanced.yAxis) {
                if (Array.isArray(enhanced.yAxis)) {
                    enhanced.yAxis.forEach(axis => enhanceAxis(axis));
                } else {
                    enhanceAxis(enhanced.yAxis);
                }
            }
            
            // 系列样式 - 应用配色
            if (enhanced.series && Array.isArray(enhanced.series)) {
                enhanced.series.forEach((series, idx) => {
                    // 柱状图样式
                    if (series.type === 'bar') {
                        series.itemStyle = {
                            color: darkThemeColors[idx % darkThemeColors.length],
                            borderRadius: [6, 6, 0, 0],
                            ...series.itemStyle
                        };
                        series.barWidth = series.barWidth || '40%';
                        series.barMaxWidth = series.barMaxWidth || 60;
                    }
                    
                    // 折线图样式
                    if (series.type === 'line') {
                        series.lineStyle = {
                            color: darkThemeColors[idx % darkThemeColors.length],
                            width: 3,
                            ...series.lineStyle
                        };
                        series.itemStyle = {
                            color: darkThemeColors[idx % darkThemeColors.length],
                            borderWidth: 2,
                            borderColor: '#1e1e28',
                            ...series.itemStyle
                        };
                        series.symbolSize = series.symbolSize || 8;
                    }
                    
                    // 饼图样式
                    if (series.type === 'pie') {
                        series.itemStyle = {
                            borderColor: '#1e1e28',
                            borderWidth: 2,
                            ...series.itemStyle
                        };
                        series.label = {
                            color: '#e8e8f0',
                            ...series.label
                        };
                    }
                });
            }
            
            return enhanced;
        }

        // 辅助函数：增强轴样式
        function enhanceAxis(axis) {
            axis.axisLine = {
                lineStyle: {
                    color: '#2a2a36'
                },
                ...axis.axisLine
            };
            axis.axisLabel = {
                color: '#e8e8f0',
                fontSize: 13,
                ...axis.axisLabel
            };
            axis.axisTick = {
                lineStyle: {
                    color: '#2a2a36'
                },
                ...axis.axisTick
            };
            axis.splitLine = {
                lineStyle: {
                    color: '#2a2a36',
                    type: 'dashed'
                },
                ...axis.splitLine
            };
        }

        // Scroll to bottom
        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Start
        init();
    </script>
</body>
</html>
